<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f10" />
  <meta name="description" content="Fina — личные финансы: доходы, расходы, счета, цели и анализ." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Fina" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="icon" type="image/png" href="./favicon.png" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>Fina — Финансы</title>
  <style>
    :root{
      --bg:#f7f7f4;
      --surface:#ffffff;
      --surface-2:#f4f4f5;
      --surface-3:#e4e4e7;
      --text:#09090b;
      --muted:#71717a;
      --muted-2:#a1a1aa;
      --border:#e4e4e7;
      --black:#09090b;
      --white:#ffffff;
      --green:#047857;
      --green-bg:#ecfdf5;
      --red:#9f1239;
      --red-bg:#fff1f2;
      --blue:#1d4ed8;
      --blue-bg:#eff6ff;
      --shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.055);
      --shadow-lg:0 18px 50px rgba(0,0,0,.14);
      --safe-bottom:env(safe-area-inset-bottom,0px);
      --safe-top:env(safe-area-inset-top,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;min-height:100%;overflow-x:hidden;-webkit-text-size-adjust:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -webkit-tap-highlight-color:transparent;
    }
    button,input,select{font:inherit;color:inherit}
    button{border:0;background:none;cursor:pointer}
    input,select{border:0;outline:0}
    .app{
      width:100%;
      max-width:430px;
      margin:0 auto;
      min-height:100vh;
      overflow-x:hidden;
      padding:calc(12px + var(--safe-top)) 12px calc(96px + var(--safe-bottom));
    }
    .header{
      position:sticky;
      top:0;
      z-index:20;
      margin:calc(-12px - var(--safe-top)) -12px 0;
      padding:calc(12px + var(--safe-top)) 12px 10px;
      background:rgba(247,247,244,.94);
      backdrop-filter:blur(18px);
    }
    .top{display:flex;align-items:center;justify-content:space-between;gap:14px}
    .eyebrow{font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-2)}
    h1{font-size:26px;line-height:1.05;letter-spacing:-.03em;margin-top:3px}
    .actions{display:flex;gap:8px;flex-shrink:0}
    .icon-btn{width:40px;height:40px;border-radius:16px;background:var(--surface);box-shadow:var(--shadow);font-size:17px;display:flex;align-items:center;justify-content:center}
    .tabs{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:5px;margin-top:12px}
    .tab{min-width:0;min-height:46px;border-radius:16px;background:var(--surface-2);color:#52525b;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;font-weight:800;line-height:1}
    .tab .emoji{font-size:16px;line-height:1}
    .tab.active{background:var(--black);color:var(--white)}
    main{padding-top:12px}
    .grid{display:grid;gap:10px}
    .grid-2{grid-template-columns:minmax(0,1fr) minmax(0,1fr)}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:14px;box-shadow:var(--shadow);overflow:hidden;min-width:0}
    .card.dark{background:var(--black);border-color:var(--black);color:var(--white)}
    .card.green{background:var(--green-bg);border-color:#d1fae5;color:#064e3b}
    .card.red{background:var(--red-bg);border-color:#ffe4e6;color:#881337}
    .card.blue{background:var(--blue-bg);border-color:#dbeafe;color:#1e3a8a}
    .metric{display:flex;justify-content:space-between;gap:8px;min-width:0}
    .metric-main{min-width:0;flex:1}
    .metric .label{font-size:11px;font-weight:800;color:var(--muted);line-height:1.1}
    .metric.dark .label{color:#a1a1aa}
    .metric .value{font-size:22px;font-weight:900;letter-spacing:-.035em;margin-top:5px;line-height:1.02;word-break:break-word}
    .metric .sub{font-size:11px;color:var(--muted);margin-top:7px;line-height:1.22}
    .metric.dark .sub{color:#a1a1aa}
    .metric-icon{flex-shrink:0;min-width:34px;height:34px;border-radius:14px;background:rgba(255,255,255,.72);display:flex;align-items:center;justify-content:center;font-size:18px}
    .dark .metric-icon{background:rgba(255,255,255,.1)}
    .section-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
    .section-title-left{display:flex;align-items:center;gap:9px;min-width:0}
    .round-icon{width:36px;height:36px;border-radius:15px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    h2{font-size:16px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .muted{color:var(--muted)}
    .tiny{font-size:12px}
    .list{display:grid;gap:8px}
    .row{display:flex;align-items:center;justify-content:space-between;gap:10px;border-radius:18px;background:#fafafa;padding:11px;min-width:0}
    .row-left{display:flex;align-items:center;gap:10px;min-width:0}
    .row-icon{width:40px;height:40px;border-radius:16px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
    .row-title{font-size:14px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .row-sub{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .row-amount{font-size:14px;font-weight:900;white-space:nowrap;text-align:right}
    .income{color:var(--green)}
    .expense{color:var(--red)}
    .bar{height:8px;background:var(--surface-2);border-radius:999px;overflow:hidden}
    .bar-fill{height:100%;background:var(--black);border-radius:999px;transition:width .2s}
    .budget-row{display:grid;gap:7px}
    .budget-head{display:flex;justify-content:space-between;gap:10px;font-size:14px}
    .budget-head span:last-child{white-space:nowrap}
    .search{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:12px;box-shadow:var(--shadow)}
    .search input{background:transparent;width:100%;font-size:14px}
    .switches{display:flex;gap:8px;margin-bottom:12px}
    .pill{border-radius:999px;padding:9px 14px;background:var(--surface-2);font-size:14px;font-weight:800;color:#52525b}
    .pill.active{background:var(--black);color:var(--white)}
    .primary{width:100%;height:48px;border-radius:18px;background:var(--black);color:#fff;font-weight:900;display:flex;align-items:center;justify-content:center;gap:8px}
    .secondary{height:40px;border-radius:999px;background:var(--surface-2);padding:0 14px;font-size:13px;font-weight:800;color:#52525b;white-space:nowrap}
    .bottom-nav{position:fixed;left:50%;bottom:calc(10px + var(--safe-bottom));transform:translateX(-50%);z-index:30;width:calc(100% - 24px);max-width:406px;background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:999px;padding:8px;box-shadow:var(--shadow-lg);backdrop-filter:blur(18px)}
    .bottom-nav-inner{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:4px}
    .bottom-btn{height:48px;border-radius:999px;font-size:19px;color:#71717a;display:flex;align-items:center;justify-content:center}
    .bottom-btn.active{background:var(--black);color:#fff}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:50;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(5px)}
    .modal-bg.open{display:flex}
    .modal{width:100%;max-width:430px;background:var(--bg);border-radius:28px 28px 0 0;padding:18px 14px calc(18px + var(--safe-bottom));max-height:92vh;overflow:auto}
    .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .modal h3{font-size:22px;letter-spacing:-.02em}
    .close{width:38px;height:38px;border-radius:50%;background:var(--surface-2);font-size:20px}
    .field{display:grid;gap:6px;margin-top:12px}
    .field label{font-size:12px;font-weight:800;color:var(--muted)}
    .field input,.field select{height:46px;border-radius:16px;background:var(--surface);border:1px solid var(--border);padding:0 13px;width:100%}
    .form-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px}
    .toast{position:fixed;left:50%;bottom:calc(86px + var(--safe-bottom));transform:translateX(-50%) translateY(20px);background:var(--black);color:#fff;border-radius:999px;padding:11px 16px;font-size:14px;font-weight:800;opacity:0;pointer-events:none;transition:.2s;z-index:80;box-shadow:var(--shadow-lg);white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .hidden{display:none!important}
    .data-buttons{display:flex;flex-wrap:wrap;gap:8px}
    .danger{color:var(--red)}
    .note{font-size:12px;color:var(--muted);line-height:1.35}
    .empty{border-radius:18px;background:#fafafa;padding:14px;font-size:14px;color:var(--muted);line-height:1.35}


    .danger-btn{width:100%;height:46px;border-radius:18px;background:#fff1f2;color:var(--red);font-weight:900;display:flex;align-items:center;justify-content:center;margin-top:10px}
    .clickable{cursor:pointer}

    .ref-grid{display:grid;gap:8px}
    .ref-item{display:flex;align-items:center;justify-content:space-between;gap:10px;border-radius:18px;background:#fafafa;padding:10px 11px;min-width:0}
    .ref-left{display:flex;align-items:center;gap:10px;min-width:0}
    .ref-icon{width:36px;height:36px;border-radius:14px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
    .ref-name{font-size:14px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ref-actions{display:flex;gap:6px;flex-shrink:0}
    .mini-btn{height:32px;border-radius:999px;background:var(--surface-2);padding:0 10px;font-size:12px;font-weight:900;color:#52525b;white-space:nowrap}
    .mini-btn.danger{color:var(--red)}
    .ref-columns{display:grid;grid-template-columns:1fr;gap:12px}

    @media(max-width:380px){
      .app{padding-left:10px;padding-right:10px}
      .header{margin-left:-10px;margin-right:-10px;padding-left:10px;padding-right:10px}
      h1{font-size:24px}
      .tab{font-size:9px;min-height:44px;border-radius:15px}
      .tab .emoji{font-size:15px}
      .metric .value{font-size:19px}
      .card{padding:12px;border-radius:20px}
      .metric-icon{min-width:30px;height:30px;font-size:16px}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="top">
        <div>
          <div class="eyebrow">Fina</div>
          <h1>Финансы</h1>
        </div>
        <div class="actions">
          <button class="icon-btn" id="voiceBtn" title="Голосовой ввод">🎙️</button>
          <button class="icon-btn" id="photoBtn" title="Фото чека">📷</button>
        </div>
      </div>
      <div class="tabs" id="topTabs"></div>
    </header>
    <main id="view"></main>
  </div>

  <nav class="bottom-nav">
    <div class="bottom-nav-inner" id="bottomTabs"></div>
  </nav>

  <div class="modal-bg" id="txModal">
    <div class="modal">
      <div class="modal-head">
        <h3 id="txModalTitle">Новая операция</h3>
        <button class="close" id="closeModal">×</button>
      </div>
      <div class="switches">
        <button class="pill active" data-type="expense">Расход</button>
        <button class="pill" data-type="income">Доход</button>
      </div>
      <div class="field">
        <label>Сумма</label>
        <input id="txAmount" inputmode="decimal" placeholder="Например 15000" />
      </div>
      <div class="field">
        <label>Название</label>
        <input id="txTitle" placeholder="Например консультация / дом / реклама" />
      </div>
      <div class="form-grid">
        <div class="field">
          <label>Дата</label>
          <input id="txDate" type="date" />
        </div>
        <div class="field">
          <label>Счёт</label>
          <select id="txAccount"></select>
        </div>
      </div>
      <div class="field" id="sourceField">
        <label>Источник дохода</label>
        <select id="txSource"></select>
      </div>
      <div class="field">
        <label>Направление</label>
        <select id="txDirection"></select>
      </div>
      <div class="field">
        <label>Категория</label>
        <input id="txCategory" placeholder="Например семья, реклама, обучение" />
      </div>
      <button class="primary" id="saveTx" style="margin-top:16px;">Сохранить</button>
      <button class="danger-btn hidden" id="deleteTx">Удалить операцию</button>
    </div>
  </div>


  <div class="modal-bg" id="refModal">
    <div class="modal">
      <div class="modal-head">
        <h3 id="refModalTitle">Справочник</h3>
        <button class="close" id="closeRefModal">×</button>
      </div>

      <div class="field">
        <label>Название</label>
        <input id="refName" placeholder="Например Работа, Семья, Проекты" />
      </div>

      <div class="field">
        <label>Иконка</label>
        <input id="refIcon" placeholder="Например 💼" maxlength="4" />
      </div>

      <button class="primary" id="saveRef" style="margin-top:16px;">Сохранить</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
(function(){
  const STORAGE_KEY = "fina_state_v3";
  const OLD_KEYS = ["fina_owner_state_v1", "fina_owner_state_v2", "fina_owner_state", "fina_state", "fina_state_v2"];

  const defaultState = {
    tab:"today",
    txType:"expense",
    accounts:[
      { id: "card", name: "Основная карта", type: "Карта", icon: "💳", balance: 0, color: "#2563eb" },
      { id: "cash", name: "Наличные", type: "Наличные", icon: "💵", balance: 0, color: "#10b981" },
      { id: "reserve", name: "Резерв", type: "Накопления", icon: "🏦", balance: 0, color: "#8b5cf6" },
      { id: "invest", name: "Инвестиции", type: "Капитал", icon: "📈", balance: 0, color: "#09090b" }
    ],
    incomeSources:[
      { id: "main", name: "Основной доход", icon: "💼" },
      { id: "extra", name: "Доп. доход", icon: "➕" },
      { id: "projects", name: "Проекты", icon: "🗂️" },
      { id: "online", name: "Онлайн-доход", icon: "🌐" },
      { id: "invest", name: "Инвестиции", icon: "📈" },
      { id: "other", name: "Прочее", icon: "📦" }
    ],
    directions:[
      { id: "personal", name: "Личное", icon: "👤" },
      { id: "family", name: "Семья", icon: "👨‍👩‍👧" },
      { id: "home", name: "Дом", icon: "🏠" },
      { id: "main", name: "Основной доход", icon: "💼" },
      { id: "projects", name: "Проекты", icon: "🌐" },
      { id: "extra", name: "Доп. доход", icon: "💼" },
      { id: "education", name: "Обучение", icon: "🎓" },
      { id: "invest", name: "Инвестиции", icon: "📈" }
    ],
    goals:[
      { id: "g1", name: "Резерв", current: 0, target: 0, priority: "Главная", deadline: "" },
      { id: "g2", name: "Крупная цель", current: 0, target: 0, priority: "Рост", deadline: "" },
      { id: "g3", name: "Инвестиции", current: 0, target: 0, priority: "Капитал", deadline: "" }
    ],
    recurring:[],
    budgets:[
      { name: "Семья", used: 0, limit: 0 },
      { name: "Обучение", used: 0, limit: 0 },
      { name: "Проекты", used: 0, limit: 0 },
      { name: "Сервисы", used: 0, limit: 0 }
    ],
    transactions:[]
  };

  const nav = [
    { id:"today", label:"Главная", icon:"🏠" },
    { id:"operations", label:"Операции", icon:"🧾" },
    { id:"accounts", label:"Счета", icon:"💳" },
    { id:"goals", label:"Цели", icon:"🎯" },
    { id:"analytics", label:"Анализ", icon:"📊" }
  ];

  let state = load();
  let query = "";
  let refDraft = { kind: null, id: null };
  let editTxId = null;

  function clone(o){ return JSON.parse(JSON.stringify(o)); }

  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) {
        OLD_KEYS.forEach(k => localStorage.removeItem(k));
        return clone(defaultState);
      }
      const parsed = JSON.parse(raw);
      return {...clone(defaultState), ...parsed};
    }catch(e){
      return clone(defaultState);
    }
  }

  function save(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function fmt(n){
    return new Intl.NumberFormat("ru-RU",{style:"currency",currency:"RUB",maximumFractionDigits:0}).format(Number(n || 0));
  }

  function num(v){
    return Number(String(v || "").replace(/\s/g,"").replace(",", ".")) || 0;
  }

  function uid(){
    return "id_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
  }

  function toast(msg){
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toast.t);
    toast.t = setTimeout(()=>el.classList.remove("show"), 2200);
  }

  function find(arr,id){ return arr.find(x=>x.id===id); }

  function sumTx(predicate){
    return state.transactions.filter(predicate).reduce((acc,t)=>acc+Number(t.amount || 0),0);
  }

  function accountBalance(acc){
    let balance = Number(acc.balance || 0);
    state.transactions.forEach(t=>{
      if(t.accountId !== acc.id) return;
      if(t.type === "income") balance += Number(t.amount || 0);
      if(t.type === "expense") balance -= Number(t.amount || 0);
    });
    return balance;
  }

  function totals(){
    const balance = state.accounts.reduce((acc,a)=>acc+accountBalance(a),0);
    const income = sumTx(t=>t.type==="income");
    const expense = sumTx(t=>t.type==="expense");
    const reserveAcc = state.accounts.find(a=>a.id==="reserve");
    const reserve = reserveAcc ? accountBalance(reserveAcc) : 0;
    const fixedToMonthEnd = state.recurring.reduce((acc,r)=>acc+Number(r.amount || 0),0);
    const plannedGoals = 0;
    const free = balance - reserve - fixedToMonthEnd - plannedGoals;
    const today = new Date();
    const last = new Date(today.getFullYear(), today.getMonth()+1, 0);
    const daysLeft = Math.max(1, last.getDate() - today.getDate() + 1);
    return { balance, income, expense, net:income-expense, reserve, fixedToMonthEnd, free, daysLeft, dayLimit: Math.max(0, free / daysLeft) };
  }

  function sourceStats(){
    return state.incomeSources.map(s=>({
      ...s,
      amount: sumTx(t=>t.type==="income" && t.sourceId===s.id)
    })).filter(s=>s.amount>0).sort((a,b)=>b.amount-a.amount);
  }

  function directionStats(){
    return state.directions.map(d=>({
      ...d,
      income: sumTx(t=>t.type==="income" && t.directionId===d.id),
      expense: sumTx(t=>t.type==="expense" && t.directionId===d.id)
    })).filter(d=>d.income || d.expense).sort((a,b)=>b.expense-a.expense);
  }

  function setTab(tab){
    state.tab = tab;
    save();
    render();
  }

  function renderTabs(){
    ["topTabs","bottomTabs"].forEach(id=>{
      const wrap = document.getElementById(id);
      wrap.innerHTML = nav.map(item=>{
        const active = state.tab===item.id ? "active" : "";
        if(id==="topTabs"){
          return `<button class="tab ${active}" data-tab="${item.id}"><span class="emoji">${item.icon}</span><span>${item.label}</span></button>`;
        }
        return `<button class="bottom-btn ${active}" data-tab="${item.id}" title="${item.label}">${item.icon}</button>`;
      }).join("");
      wrap.querySelectorAll("[data-tab]").forEach(btn=>btn.onclick=()=>setTab(btn.dataset.tab));
    });
  }

  function metric(label,value,sub,icon,tone=""){
    return `<div class="card ${tone}"><div class="metric ${tone}">
      <div class="metric-main"><div class="label">${label}</div><div class="value">${value}</div>${sub?`<div class="sub">${sub}</div>`:""}</div>
      <div class="metric-icon">${icon}</div>
    </div></div>`;
  }

  function sectionTitle(icon,title,right=""){
    return `<div class="section-title"><div class="section-title-left"><div class="round-icon">${icon}</div><h2>${title}</h2></div>${right}</div>`;
  }

  function progress(value){
    const safe = Math.max(0, Math.min(100, value || 0));
    return `<div class="bar"><div class="bar-fill" style="width:${safe}%"></div></div>`;
  }

  function renderToday(){
    const t = totals();
    const sStats = sourceStats();
    const dStats = directionStats();
    const topSource = sStats[0]?.name || "—";
    const topExpenseDirection = dStats.find(d=>d.expense>0)?.name || "—";

    return `<div class="grid">
      ${metric("Личный баланс", fmt(t.balance), "Карты, наличные, резерв и капитал", "💰", "dark")}
      <div class="grid grid-2">
        ${metric("Доход месяца", fmt(t.income), "Главный: " + topSource, "↗️", "green")}
        ${metric("Расход месяца", fmt(t.expense), "Главное: " + topExpenseDirection, "↘️", "red")}
      </div>
      <div class="grid grid-2">
        ${metric("Свободно", fmt(t.free), "После резерва и обязательств", "🛡️", "blue")}
        ${metric("Дневной лимит", fmt(t.dayLimit), `До конца месяца: ${t.daysLeft} дн.`, "₽")}
      </div>

      <section class="card">
        ${sectionTitle("📅","Ближайшие регулярные","<button class='secondary' id='addTxTop'>+ Операция</button>")}
        <div class="list">
          ${state.recurring.length ? state.recurring.map(r=>`<div class="row">
            <div class="row-left"><div class="row-icon">🔁</div><div><div class="row-title">${escapeHtml(r.title)}</div><div class="row-sub">${escapeHtml(r.date)} · ${escapeHtml(r.type)}</div></div></div>
            <div class="row-amount">${fmt(r.amount)}</div>
          </div>`).join("") : `<div class="empty">Регулярных платежей пока нет.</div>`}
        </div>
      </section>

      <section class="card">
        ${sectionTitle("🎚️","Бюджеты месяца")}
        <div class="list">
          ${state.budgets.map(b=>`<div class="budget-row">
            <div class="budget-head"><strong>${escapeHtml(b.name)}</strong><span class="muted">${fmt(b.used)} / ${fmt(b.limit)}</span></div>
            ${progress(b.limit > 0 ? (b.used/b.limit)*100 : 0)}
          </div>`).join("")}
        </div>
      </section>
    </div>`;
  }

  function renderOperations(){
    const txs = state.transactions
      .filter(t => (`${t.title} ${t.category}`).toLowerCase().includes(query.toLowerCase()))
      .sort((a,b)=>String(b.date).localeCompare(String(a.date)));

    return `<div class="grid">
      <section class="card">
        ${sectionTitle("➕","Быстро добавить")}
        <button class="primary" id="openTx">➕ Добавить операцию</button>
      </section>

      <div class="search"><span>🔎</span><input id="searchInput" value="${escapeHtml(query)}" placeholder="Поиск по операциям" /></div>

      <div class="list">
        ${txs.map(t=>{
          const dir = find(state.directions,t.directionId);
          const src = find(state.incomeSources,t.sourceId);
          const sign = t.type==="income" ? "+" : "−";
          const cls = t.type==="income" ? "income" : "expense";
          const icon = t.type==="income" ? "↗️" : "↘️";
          return `<div class="card clickable" data-tx-edit="${t.id}" style="padding:13px;">
            <div class="row-left" style="width:100%;justify-content:space-between;">
              <div class="row-left" style="min-width:0;">
                <div class="row-icon" style="background:${t.type==="income"?"#ecfdf5":"#fff1f2"}">${icon}</div>
                <div style="min-width:0;"><div class="row-title">${escapeHtml(t.title)}</div><div class="row-sub">${dir?.icon||""} ${escapeHtml(dir?.name||"")} ${src ? "· " + escapeHtml(src.name) : ""}</div></div>
              </div>
              <div style="text-align:right;"><div class="row-amount ${cls}">${sign}${fmt(t.amount)}</div><div class="row-sub">${escapeHtml(t.date)}</div></div>
            </div>
          </div>`;
        }).join("") || `<div class="card"><div class="empty">Операций пока нет. Нажмите «Добавить операцию».</div></div>`}
      </div>
    </div>`;
  }

  function renderAccounts(){
    return `<div class="grid">
      ${state.accounts.map(a=>`<div class="card">
        <div class="row-left" style="width:100%;justify-content:space-between;">
          <div class="row-left"><div class="row-icon" style="background:${a.color};color:#fff">${a.icon}</div><div><div class="row-title">${escapeHtml(a.name)}</div><div class="row-sub">${escapeHtml(a.type)}</div></div></div>
          <div style="text-align:right;"><div class="row-amount">${fmt(accountBalance(a))}</div><div class="row-sub">RUB</div></div>
        </div>
      </div>`).join("")}
    </div>`;
  }

  function renderGoals(){
    return `<div class="grid">
      ${state.goals.map(g=>`<div class="card">
        <div class="budget-head" style="margin-bottom:10px;"><div><strong>${escapeHtml(g.name)}</strong><div class="row-sub">${escapeHtml(g.priority)}${g.deadline ? " · до " + new Date(g.deadline).toLocaleDateString("ru-RU") : ""}</div></div><span class="secondary">${g.target > 0 ? Math.round((g.current/g.target)*100) : 0}%</span></div>
        ${progress(g.target > 0 ? (g.current/g.target)*100 : 0)}
        <div class="budget-head tiny" style="margin-top:10px;"><span class="muted">${fmt(g.current)}</span><strong>${fmt(g.target)}</strong></div>
      </div>`).join("")}
    </div>`;
  }


  function renderRefs(){
    const sourceItems = state.incomeSources.map(s=>`
      <div class="ref-item">
        <div class="ref-left">
          <div class="ref-icon">${s.icon || "•"}</div>
          <div class="ref-name">${escapeHtml(s.name)}</div>
        </div>
        <div class="ref-actions">
          <button class="mini-btn" data-ref-edit="source" data-id="${s.id}">Изм.</button>
          <button class="mini-btn danger" data-ref-delete="source" data-id="${s.id}">Удал.</button>
        </div>
      </div>
    `).join("");

    const directionItems = state.directions.map(d=>`
      <div class="ref-item">
        <div class="ref-left">
          <div class="ref-icon">${d.icon || "•"}</div>
          <div class="ref-name">${escapeHtml(d.name)}</div>
        </div>
        <div class="ref-actions">
          <button class="mini-btn" data-ref-edit="direction" data-id="${d.id}">Изм.</button>
          <button class="mini-btn danger" data-ref-delete="direction" data-id="${d.id}">Удал.</button>
        </div>
      </div>
    `).join("");

    return `
      <section class="card">
        ${sectionTitle("⚙️","Справочники")}
        <p class="note" style="margin-bottom:12px;">Здесь можно изменить источники дохода и направления. Источник используется только для доходов, направление — для доходов и расходов.</p>

        <div class="ref-columns">
          <div>
            <div class="budget-head" style="margin-bottom:8px;">
              <strong>Источники дохода</strong>
              <button class="mini-btn" data-ref-add="source">+ Добавить</button>
            </div>
            <div class="ref-grid">${sourceItems}</div>
          </div>

          <div>
            <div class="budget-head" style="margin:12px 0 8px;">
              <strong>Направления</strong>
              <button class="mini-btn" data-ref-add="direction">+ Добавить</button>
            </div>
            <div class="ref-grid">${directionItems}</div>
          </div>
        </div>
      </section>
    `;
  }


  function renderAnalytics(){
    const t = totals();
    const sStats = sourceStats();
    const dStats = directionStats();
    return `<div class="grid">
      <section class="card">
        ${sectionTitle("↗️","Доходы по источникам")}
        <div class="list">
          ${sStats.length ? sStats.map(s=>`<div class="budget-row">
            <div class="budget-head"><span><span>${s.icon}</span> <strong>${escapeHtml(s.name)}</strong></span><strong>${fmt(s.amount)}</strong></div>
            ${progress((s.amount/(t.income||1))*100)}
          </div>`).join("") : `<div class="empty">Доходов пока нет.</div>`}
        </div>
      </section>

      <section class="card">
        ${sectionTitle("↘️","Направления денег")}
        <div class="list">
          ${dStats.length ? dStats.map(d=>`<div class="row">
            <div class="row-left"><div class="row-icon">${d.icon}</div><div><div class="row-title">${escapeHtml(d.name)}</div><div class="row-sub">Доход: ${fmt(d.income)}</div></div></div>
            <div style="text-align:right;"><div class="row-amount expense">−${fmt(d.expense)}</div><div class="row-sub">чисто: ${fmt(d.income-d.expense)}</div></div>
          </div>`).join("") : `<div class="empty">Аналитика появится после первых операций.</div>`}
        </div>
      </section>


      ${renderRefs()}

      <section class="card">
        ${sectionTitle("❔","Как пользоваться")}
        <div class="list">
          <div class="row">
            <div class="row-left">
              <div class="row-icon">1</div>
              <div>
                <div class="row-title">Добавьте или измените операцию</div>
                <div class="row-sub">Откройте «Операции» → «Добавить операцию». Чтобы изменить запись, нажмите на уже добавленную операцию.</div>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="row-left">
              <div class="row-icon">2</div>
              <div>
                <div class="row-title">Выберите доход или расход</div>
                <div class="row-sub">Для дохода укажите источник: основной доход, доп. доход, проекты, онлайн-доход или инвестиции.</div>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="row-left">
              <div class="row-icon">3</div>
              <div>
                <div class="row-title">Укажите направление</div>
                <div class="row-sub">Направление отвечает на вопрос: для чего были деньги — личное, семья, дом, работа, проекты, обучение, здоровье, инвестиции.</div>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="row-left">
              <div class="row-icon">4</div>
              <div>
                <div class="row-title">Смотрите главную сводку</div>
                <div class="row-sub">На главной отображаются баланс, доходы, расходы, свободные деньги и дневной лимит.</div>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="row-left">
              <div class="row-icon">5</div>
              <div>
                <div class="row-title">Изменяйте справочники и делайте бэкап</div>
                <div class="row-sub">В разделе «Анализ» можно менять источники/направления и нажимать «Экспорт JSON» для копии данных.</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="card">
        ${sectionTitle("💾","Данные")}
        <p class="note" style="margin-bottom:12px;">Данные хранятся только в браузере этого устройства. Регулярно делайте JSON-бэкап.</p>
        <div class="data-buttons">
          <button class="secondary" id="exportJson">Экспорт JSON</button>
          <button class="secondary" id="importJsonBtn">Импорт JSON</button>
          <button class="secondary danger" id="resetData">Сбросить</button>
          <input type="file" id="importJson" accept=".json,application/json" class="hidden">
        </div>
      </section>
    </div>`;
  }

  function render(){
    renderTabs();
    const view = document.getElementById("view");
    const map = {
      today: renderToday,
      operations: renderOperations,
      accounts: renderAccounts,
      goals: renderGoals,
      analytics: renderAnalytics
    };
    view.innerHTML = (map[state.tab] || renderToday)();
    bindViewEvents();
  }

  function bindViewEvents(){
    const addTxTop = document.getElementById("addTxTop");
    const openTx = document.getElementById("openTx");
    if(addTxTop) addTxTop.onclick = openModal;
    if(openTx) openTx.onclick = openModal;

    const search = document.getElementById("searchInput");
    if(search){
      search.oninput = (e)=>{ query = e.target.value; renderOperationsOnly(); };
    }

    const exportBtn = document.getElementById("exportJson");
    if(exportBtn) exportBtn.onclick = exportJSON;

    const importBtn = document.getElementById("importJsonBtn");
    const importInput = document.getElementById("importJson");
    if(importBtn && importInput){
      importBtn.onclick = ()=>importInput.click();
      importInput.onchange = importJSON;
    }

    const reset = document.getElementById("resetData");
    if(reset) reset.onclick = ()=>{
      if(confirm("Сбросить все данные Fina на этом устройстве?")){
        hardReset();
      }
    };


    document.querySelectorAll("[data-ref-add]").forEach(btn=>{
      btn.onclick = ()=>openRefModal(btn.dataset.refAdd);
    });

    document.querySelectorAll("[data-ref-edit]").forEach(btn=>{
      btn.onclick = ()=>openRefModal(btn.dataset.refEdit, btn.dataset.id);
    });

    document.querySelectorAll("[data-ref-delete]").forEach(btn=>{
      btn.onclick = ()=>deleteRefItem(btn.dataset.refDelete, btn.dataset.id);
    });

    document.querySelectorAll("[data-tx-edit]").forEach(card=>{
      card.onclick = ()=>openEditTx(card.dataset.txEdit);
    });

  }

  function hardReset(){
    localStorage.removeItem(STORAGE_KEY);
    OLD_KEYS.forEach(k => localStorage.removeItem(k));
    state = clone(defaultState);
    query = "";
    save();
    render();
    toast("Данные сброшены");
  }

  function renderOperationsOnly(){
    if(state.tab === "operations") {
      document.getElementById("view").innerHTML = renderOperations();
      bindViewEvents();
      const s = document.getElementById("searchInput");
      if(s){ s.focus(); s.setSelectionRange(s.value.length, s.value.length); }
    }
  }

  function openModal(){
    editTxId = null;
    state.txType = "expense";

    document.getElementById("txModalTitle").textContent = "Новая операция";
    document.getElementById("deleteTx").classList.add("hidden");

    document.getElementById("txAmount").value = "";
    document.getElementById("txTitle").value = "";
    document.getElementById("txCategory").value = "";
    document.getElementById("txDate").value = new Date().toISOString().slice(0,10);

    fillSelects();
    updateTypeUI();

    document.getElementById("txModal").classList.add("open");
    setTimeout(()=>document.getElementById("txAmount").focus(), 100);
  }

  function openEditTx(id){
    const tx = state.transactions.find(t => t.id === id);
    if(!tx) return;

    editTxId = id;
    state.txType = tx.type || "expense";

    document.getElementById("txModalTitle").textContent = "Изменить операцию";
    document.getElementById("deleteTx").classList.remove("hidden");

    fillSelects();
    updateTypeUI();

    document.getElementById("txAmount").value = tx.amount || "";
    document.getElementById("txTitle").value = tx.title || "";
    document.getElementById("txDate").value = tx.date || new Date().toISOString().slice(0,10);
    document.getElementById("txAccount").value = tx.accountId || state.accounts[0]?.id || "";
    document.getElementById("txDirection").value = tx.directionId || state.directions[0]?.id || "";
    document.getElementById("txCategory").value = tx.category || "";

    if(tx.type === "income"){
      document.getElementById("txSource").value = tx.sourceId || state.incomeSources[0]?.id || "";
    }

    document.getElementById("txModal").classList.add("open");
    setTimeout(()=>document.getElementById("txAmount").focus(), 100);
  }

  function closeModal(){
    document.getElementById("txModal").classList.remove("open");
  }

  function fillSelects(){
    document.getElementById("txAccount").innerHTML = state.accounts.map(a=>`<option value="${a.id}">${a.icon} ${escapeHtml(a.name)}</option>`).join("");
    document.getElementById("txSource").innerHTML = state.incomeSources.map(s=>`<option value="${s.id}">${s.icon} ${escapeHtml(s.name)}</option>`).join("");
    document.getElementById("txDirection").innerHTML = state.directions.map(d=>`<option value="${d.id}">${d.icon} ${escapeHtml(d.name)}</option>`).join("");
  }

  function updateTypeUI(){
    document.querySelectorAll(".switches .pill").forEach(btn=>{
      btn.classList.toggle("active", btn.dataset.type === state.txType);
    });
    document.getElementById("sourceField").style.display = state.txType === "income" ? "grid" : "none";
  }

  function saveTransaction(){
    const amount = num(document.getElementById("txAmount").value);
    const title = document.getElementById("txTitle").value.trim();
    if(!amount){ toast("Введите сумму"); return; }
    if(!title){ toast("Введите название"); return; }

    const txData = {
      type: state.txType,
      amount,
      title,
      date: document.getElementById("txDate").value || new Date().toISOString().slice(0,10),
      accountId: document.getElementById("txAccount").value,
      sourceId: state.txType === "income" ? document.getElementById("txSource").value : undefined,
      directionId: document.getElementById("txDirection").value,
      category: document.getElementById("txCategory").value.trim() || (state.txType === "income" ? "Доход" : "Расход")
    };

    if(editTxId){
      const idx = state.transactions.findIndex(t => t.id === editTxId);
      if(idx >= 0){
        state.transactions[idx] = { ...state.transactions[idx], ...txData };
      }
      toast("Операция обновлена");
    } else {
      state.transactions.unshift({ id: uid(), ...txData });
      toast("Операция добавлена");
    }

    save();
    closeModal();
    editTxId = null;
    ["txAmount","txTitle","txCategory"].forEach(id=>document.getElementById(id).value="");
    render();
  }

  function deleteTransaction(){
    if(!editTxId) return;
    if(confirm("Удалить эту операцию?")){
      state.transactions = state.transactions.filter(t => t.id !== editTxId);
      save();
      closeModal();
      editTxId = null;
      render();
      toast("Операция удалена");
    }
  }


  function openRefModal(kind, id){
    refDraft = { kind, id: id || null };
    const list = kind === "source" ? state.incomeSources : state.directions;
    const item = id ? list.find(x => x.id === id) : null;

    document.getElementById("refModalTitle").textContent =
      kind === "source"
        ? (id ? "Изменить источник" : "Новый источник")
        : (id ? "Изменить направление" : "Новое направление");

    document.getElementById("refName").value = item ? item.name : "";
    document.getElementById("refIcon").value = item ? item.icon : "";
    document.getElementById("refModal").classList.add("open");

    setTimeout(()=>document.getElementById("refName").focus(), 100);
  }

  function closeRefModal(){
    document.getElementById("refModal").classList.remove("open");
  }

  function saveRefItem(){
    const name = document.getElementById("refName").value.trim();
    const icon = document.getElementById("refIcon").value.trim() || "•";

    if(!name){
      toast("Введите название");
      return;
    }

    const list = refDraft.kind === "source" ? state.incomeSources : state.directions;

    if(refDraft.id){
      const item = list.find(x => x.id === refDraft.id);
      if(item){
        item.name = name;
        item.icon = icon;
      }
    } else {
      list.push({
        id: uid(),
        name,
        icon
      });
    }

    save();
    closeRefModal();
    render();
    toast("Справочник обновлён");
  }

  function deleteRefItem(kind, id){
    const listName = kind === "source" ? "incomeSources" : "directions";
    const isUsed = kind === "source"
      ? state.transactions.some(t => t.sourceId === id)
      : state.transactions.some(t => t.directionId === id);

    if(isUsed){
      toast("Нельзя удалить: используется в операциях");
      return;
    }

    const minCount = kind === "source" ? 1 : 1;
    if(state[listName].length <= minCount){
      toast("Должен остаться хотя бы один элемент");
      return;
    }

    if(confirm("Удалить элемент справочника?")){
      state[listName] = state[listName].filter(x => x.id !== id);
      save();
      render();
      toast("Удалено");
    }
  }


  function exportJSON(){
    const data = JSON.stringify(state, null, 2);
    const blob = new Blob([data], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "fina-backup-" + new Date().toISOString().slice(0,10) + ".json";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
    toast("Бэкап скачан");
  }

  function importJSON(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const parsed = JSON.parse(reader.result);
        if(!parsed.transactions || !parsed.accounts) throw new Error("bad file");
        state = {...clone(defaultState), ...parsed};
        save();
        render();
        toast("Данные восстановлены");
      }catch(err){
        toast("Неверный файл");
      }
      e.target.value = "";
    };
    reader.readAsText(file);
  }

  function escapeHtml(s){
    return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }

  document.getElementById("closeModal").onclick = closeModal;
  document.getElementById("txModal").onclick = (e)=>{ if(e.target.id==="txModal") closeModal(); };
  document.querySelectorAll(".switches .pill").forEach(btn=>{
    btn.onclick = ()=>{ state.txType = btn.dataset.type; updateTypeUI(); };
  });
  document.getElementById("saveTx").onclick = saveTransaction;
  document.getElementById("deleteTx").onclick = deleteTransaction;

  document.getElementById("closeRefModal").onclick = closeRefModal;
  document.getElementById("refModal").onclick = (e)=>{ if(e.target.id==="refModal") closeRefModal(); };
  document.getElementById("saveRef").onclick = saveRefItem;

  document.getElementById("voiceBtn").onclick = ()=>toast("Голос добавим на следующем шаге");
  document.getElementById("photoBtn").onclick = ()=>toast("Фото чека добавим на следующем шаге");

  window.finaHardReset = hardReset;
  render();
})();
</script>
</body>
</html>
